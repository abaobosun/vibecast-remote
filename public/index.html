<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#159884">
  <meta name="apple-mobile-web-app-title" content="VibeCast">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icon.svg">
  <title>VibeCast Remote</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7f4;
      --panel: #ffffff;
      --panel-strong: #e8f7f2;
      --ink: #18302c;
      --muted: #657571;
      --line: #cddbd6;
      --accent: #159884;
      --accent-dark: #0b6f61;
      --danger: #be4a45;
      --button: #edf3f0;
      --shadow: 0 18px 42px rgba(31, 57, 50, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      min-height: 44px;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--button);
      color: var(--ink);
      font-weight: 700;
      touch-action: manipulation;
    }

    button:active {
      transform: translateY(1px);
    }

    .app {
      width: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 42px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
    }

    .name {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-pill {
      min-width: 94px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      background: rgba(255, 255, 255, 0.7);
    }

    .status-pill.ready {
      border-color: rgba(21, 152, 132, 0.4);
      color: var(--accent-dark);
      background: #e8f7f2;
    }

    .status-pill.offline {
      border-color: rgba(190, 74, 69, 0.35);
      color: var(--danger);
      background: #fff0ef;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .auth {
      display: grid;
      gap: 12px;
      padding: 16px;
    }

    .auth-title {
      margin: 0;
      font-size: 17px;
      font-weight: 800;
    }

    .auth-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .pin {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 5px;
      text-align: center;
      background: #fbfdfc;
    }

    .main {
      display: none;
      gap: 12px;
    }

    .main.ready {
      display: grid;
    }

    .focus-target {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      background: var(--panel-strong);
    }

    .target-icon {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: #ffffff;
      color: var(--accent-dark);
      font-size: 18px;
      font-weight: 900;
    }

    .target-label {
      min-width: 0;
    }

    .target-name {
      font-size: 17px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .target-mode {
      margin-top: 2px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .refresh {
      width: 44px;
      padding: 0;
      font-size: 18px;
      background: #ffffff;
    }

    .target-picker {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .target-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .target-card {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 62px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfc;
      color: var(--ink);
      text-align: left;
    }

    .target-card.active {
      border-color: rgba(21, 152, 132, 0.55);
      background: var(--panel-strong);
      box-shadow: inset 0 0 0 1px rgba(21, 152, 132, 0.22);
    }

    .target-card-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--button);
      color: var(--accent-dark);
      font-size: 15px;
      font-weight: 900;
    }

    .target-card.active .target-card-icon {
      background: var(--accent);
      color: #ffffff;
    }

    .target-card-text {
      min-width: 0;
    }

    .target-card-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
    }

    .target-card-meta {
      margin-top: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .composer {
      display: none;
      gap: 10px;
      padding: 12px;
    }

    .composer.ready {
      display: grid;
    }

    textarea {
      width: 100%;
      min-height: 178px;
      max-height: 42vh;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px;
      color: var(--ink);
      background: #fbfdfc;
      font-size: 18px;
      line-height: 1.45;
      outline: none;
    }

    textarea:focus,
    .pin:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(21, 152, 132, 0.18);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 0.78fr;
      gap: 8px;
    }

    .primary {
      background: var(--accent);
      color: #ffffff;
    }

    .primary.alt {
      background: var(--accent-dark);
    }

    .secondary {
      background: var(--button);
    }

    .danger {
      color: var(--danger);
    }

    .quick {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px;
    }

    .history {
      display: none;
      gap: 10px;
      padding: 12px;
    }

    .history.visible {
      display: grid;
    }

    .history-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .history-clear {
      min-height: 30px;
      padding: 0 8px;
      font-size: 12px;
      font-weight: 800;
      background: transparent;
    }

    .history-list {
      display: grid;
      gap: 8px;
    }

    .history-item {
      display: grid;
      gap: 4px;
      min-height: 48px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdfc;
      text-align: left;
    }

    .history-text {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 800;
    }

    .history-meta {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
    }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      padding: 12px;
    }

    .message {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      padding: 0 4px;
    }

    .message.error {
      color: var(--danger);
    }

    @media (max-width: 430px) {
      html {
        scroll-padding-bottom: 160px;
      }

      body {
        padding-left: 10px;
        padding-right: 10px;
        padding-bottom: max(72px, env(safe-area-inset-bottom));
      }

      .actions {
        grid-template-columns: 1fr;
      }

      .quick {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        padding: 8px;
      }

      .quick button {
        min-height: 38px;
        padding: 0 6px;
        font-size: 13px;
      }

      .history {
        padding: 8px;
      }

      .focus-target {
        grid-template-columns: 40px 1fr 40px;
      }

      .target-picker {
        padding: 8px;
      }

      .target-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
      }

      .target-card {
        grid-template-columns: 26px minmax(0, 1fr);
        gap: 5px;
        min-height: 44px;
        padding: 6px;
      }

      .target-card-icon {
        width: 26px;
        height: 26px;
        font-size: 12px;
      }

      .target-card-name {
        font-size: 12px;
      }

      .target-card-meta {
        display: none;
      }

      textarea {
        height: 56px;
        min-height: 56px;
        max-height: 56px;
        padding: 8px 10px;
        font-size: 16px;
        line-height: 1.25;
        resize: none;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel composer" id="composerPanel">
      <textarea id="textInput" autocapitalize="sentences" autocomplete="off" placeholder="语音输入内容"></textarea>
      <div class="actions">
        <button class="primary" id="sendButton">Send</button>
        <button class="primary alt" id="sendEnterButton">Send + Enter</button>
        <button class="secondary danger" id="clearButton">Clear</button>
      </div>
      <div class="message" id="message"></div>
    </section>

    <header class="topbar">
      <div class="brand">
        <div class="mark">V</div>
        <div class="name" id="appName">VibeCast Remote</div>
      </div>
      <div class="status-pill" id="status">Offline</div>
    </header>

    <section class="panel auth" id="authPanel">
      <h1 class="auth-title">Pairing PIN</h1>
      <div class="auth-row">
        <input class="pin" id="pinInput" inputmode="numeric" autocomplete="one-time-code" maxlength="4" placeholder="0000">
        <button class="primary" id="pairButton">Pair</button>
      </div>
      <div class="message" id="authMessage"></div>
    </section>

    <section class="main" id="mainPanel">
      <div class="panel focus-target">
        <div class="target-icon" id="targetInitial">C</div>
        <div class="target-label">
          <div class="target-name" id="targetName">Current Focus</div>
          <div class="target-mode">Focus target</div>
        </div>
        <button class="refresh" id="refreshButton" aria-label="Refresh target">↻</button>
      </div>

      <section class="panel target-picker">
        <div class="target-list" id="targetList"></div>
      </section>

      <section class="panel history" id="historyPanel">
        <div class="history-head">
          <span>发送历史</span>
          <button class="history-clear danger" id="clearHistoryButton" type="button">清空</button>
        </div>
        <div class="history-list" id="historyList"></div>
      </section>

      <section class="panel quick" id="quickButtons"></section>

      <section class="panel keys">
        <button data-key="Enter">Enter</button>
        <button data-key="Backspace">⌫</button>
        <button data-key="Tab">Tab</button>
        <button data-key="Escape">Esc</button>
      </section>
    </section>
  </main>

  <script>
    const state = {
      ws: null,
      authed: false,
      quickButtons: [],
      targets: [],
      activeTargetId: 'current',
      drafts: {},
      sentHistory: [],
      pendingTextSends: {},
      clientCounter: 0,
      reconnectTimer: null,
      reconnectAttempts: 0,
      hasConnected: false,
      authPending: false,
      lastAttemptPin: '',
      lastAuthMethod: '',
      pairingToken: ''
    };

    const $ = (id) => document.getElementById(id);
    const statusEl = $('status');
    const composerPanel = $('composerPanel');
    const authPanel = $('authPanel');
    const mainPanel = $('mainPanel');
    const authMessage = $('authMessage');
    const message = $('message');
    const pinInput = $('pinInput');
    const textInput = $('textInput');
    const sendButton = $('sendButton');
    const sendEnterButton = $('sendEnterButton');
    const quickButtons = $('quickButtons');
    const targetList = $('targetList');
    const historyPanel = $('historyPanel');
    const historyList = $('historyList');
    const tokenStorageKey = `vibecast_pairing_token:${location.host}`;
    const draftsStorageKey = `vibecast_drafts:${location.host}`;
    const activeTargetStorageKey = `vibecast_active_target:${location.host}`;
    const historyStorageKey = `vibecast_sent_history:${location.host}`;

    loadDrafts();
    loadActiveTarget();
    loadSentHistory();
    renderHistory();

    function loadPairingToken() {
      const params = new URLSearchParams(location.search);
      const urlToken = params.get('token');
      if (urlToken) {
        localStorage.setItem(tokenStorageKey, urlToken);
        params.delete('token');
        const query = params.toString();
        const nextUrl = `${location.pathname}${query ? `?${query}` : ''}${location.hash}`;
        history.replaceState(null, '', nextUrl);
        return urlToken;
      }
      return localStorage.getItem(tokenStorageKey) || '';
    }

    function setStatus(text, ready, offline) {
      statusEl.textContent = text;
      statusEl.classList.toggle('ready', Boolean(ready));
      statusEl.classList.toggle('offline', Boolean(offline));
    }

    function setMessage(text, isError) {
      message.textContent = text || '';
      message.classList.toggle('error', Boolean(isError));
    }

    function send(payload) {
      if (!state.ws || state.ws.readyState !== WebSocket.OPEN) {
        setStatus('已断开', false, true);
        setMessage('连接已断开，内容已保留，正在重连...', true);
        scheduleReconnect();
        return false;
      }
      state.ws.send(JSON.stringify(payload));
      return true;
    }

    function defaultTargets() {
      return [
        { id: 'current', label: 'Current Focus', hint: 'Use focused input', initial: 'C', sendMode: 'type' }
      ];
    }

    function normalizeSendMode(mode) {
      return mode === 'sendEnter' ? 'sendEnter' : 'type';
    }

    function normalizeTargets(targets) {
      const source = Array.isArray(targets) && targets.length ? targets : defaultTargets();
      const seen = new Set();
      return source
        .filter((target) => target && typeof target.id === 'string' && target.id.trim())
        .map((target) => ({
          id: target.id.trim(),
          label: String(target.label || target.id),
          hint: String(target.hint || ''),
          initial: String(target.initial || target.label || target.id).trim().charAt(0).toUpperCase() || 'C',
          sendMode: normalizeSendMode(target.sendMode)
        }))
        .filter((target) => {
          if (seen.has(target.id)) return false;
          seen.add(target.id);
          return true;
        });
    }

    function loadDrafts() {
      try {
        const parsed = JSON.parse(localStorage.getItem(draftsStorageKey) || '{}');
        state.drafts = parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        state.drafts = {};
      }
    }

    function saveDrafts() {
      localStorage.setItem(draftsStorageKey, JSON.stringify(state.drafts));
    }

    function loadSentHistory() {
      try {
        const parsed = JSON.parse(localStorage.getItem(historyStorageKey) || '[]');
        state.sentHistory = Array.isArray(parsed)
          ? parsed.filter((item) => item && typeof item.text === 'string').slice(0, 10)
          : [];
      } catch {
        state.sentHistory = [];
      }
    }

    function saveSentHistory() {
      localStorage.setItem(historyStorageKey, JSON.stringify(state.sentHistory.slice(0, 10)));
    }

    function loadActiveTarget() {
      state.activeTargetId = localStorage.getItem(activeTargetStorageKey) || 'current';
    }

    function saveActiveTarget() {
      localStorage.setItem(activeTargetStorageKey, state.activeTargetId);
    }

    function getActiveTarget() {
      return state.targets.find((target) => target.id === state.activeTargetId) || state.targets[0] || defaultTargets()[0];
    }

    function getActiveSendMode() {
      return normalizeSendMode(getActiveTarget().sendMode);
    }

    function oppositeMode(mode) {
      return normalizeSendMode(mode) === 'sendEnter' ? 'type' : 'sendEnter';
    }

    function sendModeLabel(mode) {
      return normalizeSendMode(mode) === 'sendEnter' ? 'Send + Enter' : 'Send';
    }

    function sendModeMeta(mode) {
      return normalizeSendMode(mode) === 'sendEnter' ? 'Default: send + enter' : 'Default: send only';
    }

    function updateActionButtons() {
      const primaryMode = getActiveSendMode();
      sendButton.textContent = sendModeLabel(primaryMode);
      sendEnterButton.textContent = sendModeLabel(oppositeMode(primaryMode));
    }

    function nextClientId() {
      state.clientCounter += 1;
      return `${Date.now()}-${state.clientCounter}`;
    }

    function sendText(text, mode) {
      const normalizedMode = normalizeSendMode(mode);
      const type = normalizedMode === 'sendEnter' ? 'sendEnter' : 'type';
      const clientId = nextClientId();
      state.pendingTextSends[clientId] = {
        text,
        mode: normalizedMode,
        targetId: state.activeTargetId
      };
      const ok = send({ type, text, targetId: state.activeTargetId, clientId });
      if (!ok) delete state.pendingTextSends[clientId];
      return ok;
    }

    function saveActiveDraft() {
      state.drafts[state.activeTargetId] = textInput.value;
      saveDrafts();
      renderTargets();
    }

    function setActiveTarget(id) {
      if (!state.targets.some((target) => target.id === id)) return;
      state.drafts[state.activeTargetId] = textInput.value;
      state.activeTargetId = id;
      saveActiveTarget();
      textInput.value = state.drafts[state.activeTargetId] || '';
      saveDrafts();
      renderTargets();
      updateActionButtons();
      setMessage('', false);
    }

    function setTargets(targets) {
      state.targets = normalizeTargets(targets);
      if (!state.targets.some((target) => target.id === state.activeTargetId)) {
        state.activeTargetId = state.targets[0].id;
        saveActiveTarget();
      }
      textInput.value = state.drafts[state.activeTargetId] || '';
      renderTargets();
      updateActionButtons();
    }

    function draftSummary(target) {
      const text = state.drafts[target.id] || '';
      const count = text.trim().length;
      return count ? `${count} chars draft` : sendModeMeta(target.sendMode);
    }

    function renderTargets() {
      targetList.innerHTML = '';
      const targets = state.targets.length ? state.targets : defaultTargets();
      targets.forEach((target) => {
        const button = document.createElement('button');
        const icon = document.createElement('span');
        const text = document.createElement('span');
        const name = document.createElement('span');
        const meta = document.createElement('span');
        button.type = 'button';
        button.className = 'target-card';
        button.classList.toggle('active', target.id === state.activeTargetId);
        button.setAttribute('aria-pressed', String(target.id === state.activeTargetId));
        icon.className = 'target-card-icon';
        icon.textContent = target.initial;
        text.className = 'target-card-text';
        name.className = 'target-card-name';
        name.textContent = target.label;
        meta.className = 'target-card-meta';
        meta.textContent = draftSummary(target);
        text.append(name, meta);
        button.append(icon, text);
        button.addEventListener('click', () => setActiveTarget(target.id));
        targetList.appendChild(button);
      });
    }

    function addSentHistory(entry) {
      const text = String(entry.text || '');
      if (!text.trim()) return;
      const target = state.targets.find((item) => item.id === entry.targetId) || getActiveTarget();
      const nextItem = {
        text,
        mode: normalizeSendMode(entry.mode),
        targetId: entry.targetId || state.activeTargetId,
        targetLabel: target.label || 'Current Focus',
        sentAt: Date.now()
      };
      state.sentHistory = [
        nextItem,
        ...state.sentHistory.filter((item) => item.text !== text)
      ].slice(0, 10);
      saveSentHistory();
      renderHistory();
    }

    function formatHistoryMeta(item) {
      const mode = normalizeSendMode(item.mode) === 'sendEnter' ? 'Send + Enter' : 'Send';
      const target = item.targetLabel || 'Current Focus';
      return `${target} · ${mode}`;
    }

    function renderHistory() {
      historyList.innerHTML = '';
      historyPanel.classList.toggle('visible', state.sentHistory.length > 0);
      state.sentHistory.forEach((item) => {
        const button = document.createElement('button');
        const text = document.createElement('span');
        const meta = document.createElement('span');
        button.type = 'button';
        button.className = 'history-item';
        text.className = 'history-text';
        text.textContent = item.text;
        meta.className = 'history-meta';
        meta.textContent = formatHistoryMeta(item);
        button.append(text, meta);
        button.addEventListener('click', () => {
          state.drafts[state.activeTargetId] = textInput.value;
          if (state.targets.some((target) => target.id === item.targetId)) {
            state.activeTargetId = item.targetId;
            saveActiveTarget();
          }
          textInput.value = item.text;
          state.drafts[state.activeTargetId] = item.text;
          saveDrafts();
          renderTargets();
          updateActionButtons();
          setMessage('已填入发送历史', false);
        });
        historyList.appendChild(button);
      });
    }

    function scheduleReconnect() {
      if (state.reconnectTimer) return;
      const delay = Math.min(8000, 900 + state.reconnectAttempts * 900);
      state.reconnectAttempts += 1;
      state.reconnectTimer = setTimeout(() => {
        state.reconnectTimer = null;
        setStatus('重连中', false, false);
        connect();
      }, delay);
    }

    function connect() {
      if (state.ws && (state.ws.readyState === WebSocket.OPEN || state.ws.readyState === WebSocket.CONNECTING)) return;
      if (state.reconnectTimer) {
        clearTimeout(state.reconnectTimer);
        state.reconnectTimer = null;
      }
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      state.pairingToken = loadPairingToken();
      state.ws = new WebSocket(`${protocol}//${location.host}`);
      setStatus('重连中', false, false);

      state.ws.addEventListener('open', () => {
        state.hasConnected = true;
        setStatus('重连中', false, false);
        if (state.pairingToken) {
          authPanel.style.display = 'none';
          setMessage('正在恢复连接...', false);
          authWithToken(state.pairingToken);
        } else {
          authPanel.style.display = 'grid';
        }
      });

      state.ws.addEventListener('close', () => {
        state.ws = null;
        state.authed = false;
        state.authPending = false;
        setStatus('已断开', false, true);
        setMessage('连接已断开，内容已保留，正在重连...', true);
        if (!state.hasConnected || !state.pairingToken) {
          composerPanel.classList.remove('ready');
          mainPanel.classList.remove('ready');
          authPanel.style.display = 'grid';
        }
        scheduleReconnect();
      });

      state.ws.addEventListener('error', () => {
        setStatus('已断开', false, true);
        setMessage('连接失败，内容已保留，正在重连...', true);
      });

      state.ws.addEventListener('message', (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch {
          return;
        }
        handleMessage(data);
      });
    }

    function handleMessage(data) {
      if (data.type === 'authOk') {
        state.authed = true;
        state.authPending = false;
        state.reconnectAttempts = 0;
        state.lastAttemptPin = '';
        state.lastAuthMethod = data.method || '';
        if (typeof data.token === 'string' && data.token) {
          state.pairingToken = data.token;
          localStorage.setItem(tokenStorageKey, data.token);
        }
        authPanel.style.display = 'none';
        composerPanel.classList.add('ready');
        mainPanel.classList.add('ready');
        authMessage.textContent = '';
        setMessage('', false);
        setStatus('已连接', true, false);
        return;
      }

      if (data.type === 'authFail') {
        state.authPending = false;
        if (state.lastAuthMethod === 'token') {
          localStorage.removeItem(tokenStorageKey);
          state.pairingToken = '';
          state.lastAuthMethod = '';
          composerPanel.classList.remove('ready');
          mainPanel.classList.remove('ready');
          authPanel.style.display = 'grid';
          authMessage.textContent = 'Token expired. Enter the current PIN.';
          setStatus('已断开', false, true);
          return;
        }
        const seconds = Math.ceil((data.retryAfterMs || 0) / 1000);
        authMessage.textContent = data.blocked
          ? `PIN locked, retry in ${Math.max(1, seconds)}s`
          : `Wrong PIN${Number.isInteger(data.attemptsLeft) ? `, ${data.attemptsLeft} tries left` : ''}`;
        return;
      }

      if (data.type === 'status' || data.type === 'pong') {
        if (data.appName) $('appName').textContent = data.appName;
        if (data.target && data.target.appName) {
          $('targetName').textContent = data.target.appName;
          $('targetInitial').textContent = data.target.appName.trim().charAt(0).toUpperCase() || 'C';
        }
        if (Array.isArray(data.targets)) {
          setTargets(data.targets);
        }
        if (Array.isArray(data.quickButtons)) {
          state.quickButtons = data.quickButtons;
          renderQuickButtons();
        }
        return;
      }

      if (data.type === 'sent') {
        if (data.clientId && state.pendingTextSends[data.clientId]) {
          addSentHistory(state.pendingTextSends[data.clientId]);
          delete state.pendingTextSends[data.clientId];
        }
        const target = state.targets.find((item) => item.id === data.targetId) || getActiveTarget();
        setMessage(`Sent to ${target.label}`, false);
        setTimeout(() => setMessage('', false), 900);
        return;
      }

      if (data.type === 'error') {
        if (data.clientId && state.pendingTextSends[data.clientId]) {
          delete state.pendingTextSends[data.clientId];
        }
        setMessage(data.message || 'Injection failed', true);
      }
    }

    function renderQuickButtons() {
      quickButtons.innerHTML = '';
      state.quickButtons.forEach((item) => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = item.label || item.payload || 'Send';
        button.addEventListener('click', () => {
          const payload = String(item.payload || '');
          if (!payload) return;
          sendText(payload, getActiveSendMode());
        });
        quickButtons.appendChild(button);
      });
    }

    function authWithToken(token) {
      if (!token || state.authPending) return;
      state.authPending = true;
      state.lastAuthMethod = 'token';
      authMessage.textContent = '';
      if (!send({ type: 'auth', token })) {
        state.authPending = false;
      }
    }

    function pair() {
      const pin = pinInput.value.trim();
      if (pin.length !== 4) {
        authMessage.textContent = 'Enter 4 digits';
        return;
      }
      if (state.authPending && pin === state.lastAttemptPin) return;
      state.authPending = true;
      state.lastAuthMethod = 'pin';
      state.lastAttemptPin = pin;
      if (!send({ type: 'auth', pin })) {
        state.authPending = false;
      }
    }

    $('pairButton').addEventListener('click', pair);
    pinInput.addEventListener('input', () => {
      pinInput.value = pinInput.value.replace(/\D/g, '').slice(0, 4);
      state.authPending = false;
      state.lastAuthMethod = '';
      state.lastAttemptPin = '';
      if (pinInput.value.length === 4) pair();
    });
    pinInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') pair();
    });

    sendButton.addEventListener('click', () => {
      const text = textInput.value;
      if (!text) return;
      sendText(text, getActiveSendMode());
    });

    sendEnterButton.addEventListener('click', () => {
      const text = textInput.value;
      sendText(text, oppositeMode(getActiveSendMode()));
    });

    $('clearButton').addEventListener('click', () => {
      textInput.value = '';
      saveActiveDraft();
      setMessage('', false);
    });

    $('clearHistoryButton').addEventListener('click', () => {
      state.sentHistory = [];
      saveSentHistory();
      renderHistory();
    });

    $('refreshButton').addEventListener('click', () => {
      send({ type: 'ping' });
    });

    document.querySelectorAll('[data-key]').forEach((button) => {
      button.addEventListener('click', () => {
        send({ type: 'key', key: button.dataset.key });
      });
    });

    textInput.addEventListener('input', saveActiveDraft);
    setTargets(defaultTargets());
    connect();
  </script>
</body>
</html>
